<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Control de Mercadería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2>Registrar Producto Avariado</h2>
    
    <form th:action="@{/guardar}" th:object="${mercaderia}" method="post" class="row g-3 mb-5">
        <div class="col-md-3">
            <input type="text" th:field="*{codigoInterno}" class="form-control" placeholder="Código">
        </div>
        <div class="col-md-5">
            <input type="text" th:field="*{descripcion}" class="form-control" placeholder="Descripción">
        </div>
        <div class="col-md-2">
            <select th:field="*{estado}" class="form-control">
                <option value="Avariado">Avariado</option>
                <option value="Vencido">Vencido</option>
                <option value="Roto">Roto</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Guardar</button>
        </div>
    </form>

    <hr>

    <h3>Inventario de Mermas</h3>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Código</th>
                <th>Descripción</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${lista}">
                <td th:text="${m.id}"></td>
                <td th:text="${m.codigoInterno}"></td>
                <td th:text="${m.descripcion}"></td>
                <td th:text="${m.estado}"></td>
            </tr>
        </tbody>
    </table>

</body>
</html>
